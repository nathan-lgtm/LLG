function initials(n){return n.split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2)||'?';}
function rankSuffix(r){return r===1?'er':'e';}
function computeStreak(days){
  if(!days.length) return 0;
  const sorted=days.slice().sort();
  let streak=0,cur=new Date();cur.setHours(0,0,0,0);
  while(true){
    const s=cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0');
    if(sorted.includes(s)){streak++;cur.setDate(cur.getDate()-1);}else break;
  }
  return streak;
}
function buildHeatmap(activeDays){
  const wrap=document.createElement('div');wrap.className='heatmap';
  const today=new Date();today.setHours(0,0,0,0);
  const set=new Set(activeDays);
  for(let i=89;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const str=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const el=document.createElement('div');el.className='hm-day';
    if(set.has(str))el.classList.add('active');
    if(i===0)el.classList.add('today');
    el.title=str;wrap.appendChild(el);
  }
  return wrap;
}

let chartInstance = null;
function buildChart(logs){
  const wrap=document.createElement('div');wrap.className='chart-card';

  const titleRow=document.createElement('div');
  titleRow.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-bottom:0.8rem;';

  titleRow.appendChild(titleEl);titleRow.appendChild(refreshBtn);
  wrap.appendChild(titleRow);

  const cw=document.createElement('div');cw.className='chart-wrap';
  const canvas=document.createElement('canvas');canvas.id='progressCanvas';cw.appendChild(canvas);wrap.appendChild(cw);
  setTimeout(()=>renderChart(canvas,logs),50);

  // Listener directement sur l'élément — pas besoin de getElementById
  refreshBtn.addEventListener('click', async()=>{
    refreshBtn.textContent='↻ …';refreshBtn.disabled=true;
    const{data:freshLogs}=await sb.from('progress_log').select('recorded_at,total_points,total_done').eq('user_id',document.getElementById('progressCanvas').dataset.uid).order('recorded_at',{ascending:true});
    renderChart(canvas,freshLogs||[]);
    refreshBtn.textContent='↻ Actualiser';refreshBtn.disabled=false;
  });

  return wrap;
}

function renderChart(canvas, logs){
  logs=(logs||[]).slice().sort((a,b)=>new Date(a.recorded_at)-new Date(b.recorded_at));
  const fmt=d=>{const dt=new Date(d);return dt.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})+' '+dt.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});};
  const labels=logs.length?['Début',...logs.map(l=>fmt(l.recorded_at))]:['Début'];
  const data=logs.length?[0,...logs.map(l=>l.total_points)]:[0];
  if(chartInstance) chartInstance.destroy();
  chartInstance=new Chart(canvas,{
    type:'line',
    data:{labels,datasets:[{
      label:'Points',data,
      borderColor:'#7c5c2a',backgroundColor:'rgba(124,92,42,0.08)',
      borderWidth:2,pointRadius:3,pointBackgroundColor:'#7c5c2a',tension:0.35,fill:true,
    }]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{title:items=>items[0].label,label:item=>`${item.raw} pts`}}},
      scales:{
        x:{title:{display:true,text:'Date',color:'#9a9590',font:{family:'JetBrains Mono',size:11}},ticks:{color:'#9a9590',font:{family:'JetBrains Mono',size:10},maxRotation:30},grid:{color:'#ddd9d0'}},
        y:{title:{display:true,text:'Points cumulés',color:'#9a9590',font:{family:'JetBrains Mono',size:11}},ticks:{color:'#9a9590',font:{family:'JetBrains Mono',size:10}},grid:{color:'#ddd9d0'},beginAtZero:true}
      }
    }
  });
}

async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){location.href='index.html';return;}
  const myId=session.user.id;
  const params=new URLSearchParams(location.search);
  const targetId=params.get('user')||myId;
  const isOwn=targetId===myId;

  const{data:profile}=await sb.from('profiles').select('username,bio').eq('id',targetId).single();
  const{data:myProfile}=isOwn?{data:profile}:await sb.from('profiles').select('username').eq('id',myId).single();
  document.getElementById('topbarUser').textContent=myProfile?.username||'';

  const{data:exRows}=await sb.from('exercises').select('exercise_num,done').eq('user_id',targetId);
  const doneSet=new Set((exRows||[]).filter(r=>r.done).map(r=>r.exercise_num));
  const{data:actRows}=await sb.from('activity_days').select('day').eq('user_id',targetId);
  const activeDays=(actRows||[]).map(r=>r.day);
  const{data:lb}=await sb.from('leaderboard').select('id,done_count');
  const lbSorted=(lb||[]).slice().sort((a,b)=>b.done_count-a.done_count);
  const rank=lbSorted.findIndex(u=>u.id===targetId)+1;
  const totalUsers=lbSorted.length;
  const{data:logs}=await sb.from('progress_log').select('recorded_at,total_points,total_done').eq('user_id',targetId).order('recorded_at',{ascending:true});

  let totalPoints=0,totalDone=0;
  const byLevel={1:{done:0,total:0,pts:0},2:{done:0,total:0,pts:0},3:{done:0,total:0,pts:0},4:{done:0,total:0,pts:0},5:{done:0,total:0,pts:0}};
  for(let n=1;n<=TOTAL;n++){
    const lvl=LEVELS[n]||3;byLevel[lvl].total++;
    if(doneSet.has(n)){totalPoints+=PTS[lvl];totalDone++;byLevel[lvl].done++;byLevel[lvl].pts+=PTS[lvl];}
  }
  const streak=computeStreak(activeDays);
  const pct=(totalDone/TOTAL*100).toFixed(1);

  const content=document.getElementById('content');
  content.style.display='';
  document.getElementById('loading').style.display='none';

  // ── PROFILE HEADER ──
  const header=document.createElement('div');header.className='profile-header';
  header.innerHTML=`
    <div class="avatar">${initials(profile?.username||'?')}</div>
    <div class="profile-info">
      <div class="profile-name">${profile?.username||'Utilisateur'} ${isOwn?'<em>(toi)</em>':''}</div>
      <div class="profile-sub">Membre · ${totalDone} exercice${totalDone>1?'s':''} terminé${totalDone>1?'s':''}</div>
      <div class="profile-kpis">
        <div class="kpi"><span class="kpi-val gold">${totalPoints.toLocaleString()}</span><span class="kpi-lbl">Points</span></div>
        <div class="kpi"><span class="kpi-val green">${pct} %</span><span class="kpi-lbl">Progression</span></div>
        <div class="kpi"><span class="kpi-val fire">🔥 ${streak}</span><span class="kpi-lbl">Jours consécutifs</span></div>
        <div class="kpi"><span class="kpi-val">${activeDays.length}</span><span class="kpi-lbl">Jours actifs</span></div>
      </div>
    </div>
    <div class="rank-badge">
      <div class="rank-circle"><span class="rank-num">${rank}</span><span class="rank-suffix">${rankSuffix(rank)}</span></div>
      <div class="rank-lbl">/ ${totalUsers} membres</div>
    </div>`;
  content.appendChild(header);

  // ── BIO ──
  const bioCard=document.createElement('div');bioCard.className='bio-card';
  const bioText=profile?.bio||'';
  if(isOwn){
    bioCard.innerHTML=`
      <div class="section-title" style="margin-bottom:0.6rem">Description</div>
      <div class="bio-display${!bioText?' empty':''}" id="bioDisplay">${bioText||'Ajoute une description…'}</div>
      <button class="bio-edit-btn" id="bioEditBtn">✏️ Modifier</button>
      <div class="bio-edit-wrap" id="bioEditWrap" style="display:none">
        <textarea class="bio-textarea" id="bioTextarea" placeholder="Parle de toi, de ta prépa, de ta progression…" maxlength="300">${bioText}</textarea>
        <div class="bio-actions">
          <button class="bio-btn bio-save" id="bioSaveBtn">Enregistrer</button>
          <button class="bio-btn bio-cancel" id="bioCancelBtn">Annuler</button>
          <span class="bio-saved-msg" id="bioSavedMsg">✓ Sauvegardé</span>
        </div>
      </div>`;
    content.appendChild(bioCard);
    document.getElementById('bioEditBtn').addEventListener('click',()=>{
      document.getElementById('bioEditWrap').style.display='flex';
      document.getElementById('bioEditBtn').style.display='none';
      document.getElementById('bioTextarea').focus();
    });
    document.getElementById('bioCancelBtn').addEventListener('click',()=>{
      document.getElementById('bioEditWrap').style.display='none';
      document.getElementById('bioEditBtn').style.display='inline-block';
      document.getElementById('bioTextarea').value=bioText;
    });
    document.getElementById('bioSaveBtn').addEventListener('click',async()=>{
      const newBio=document.getElementById('bioTextarea').value.trim();
      await sb.from('profiles').update({bio:newBio}).eq('id',myId);
      document.getElementById('bioDisplay').textContent=newBio||'Ajoute une description…';
      document.getElementById('bioDisplay').className='bio-display'+(newBio?'':' empty');
      document.getElementById('bioEditWrap').style.display='none';
      document.getElementById('bioEditBtn').style.display='inline-block';
      const msg=document.getElementById('bioSavedMsg');msg.style.display='inline';
      setTimeout(()=>msg.style.display='none',2000);
    });
  } else {
    bioCard.innerHTML=`
      <div class="section-title" style="margin-bottom:0.6rem">Description</div>
      <div class="bio-display${!bioText?' empty':''}">${bioText||'Pas encore de description.'}</div>`;
    content.appendChild(bioCard);
  }

  // ── POINTS BREAKDOWN ──
  content.insertAdjacentHTML('beforeend','<div class="section-title">Points par niveau</div>');
  const ptsCard=document.createElement('div');ptsCard.className='points-card';
  ptsCard.innerHTML=`<div class="points-grid">${[1,2,3,4,5].map(l=>`
    <div class="pts-item lv${l}">
      <div class="pts-lvl lv${l}">Niveau ${l}</div>
      <div class="pts-per lv${l}">${PTS[l]} <span class="pts-unit">pts/exo</span></div>
      <div class="pts-earned">${byLevel[l].done}/${byLevel[l].total} exos<br>${byLevel[l].pts} pts</div>
    </div>`).join('')}</div>`;
  content.appendChild(ptsCard);

  // ── CHAPTERS ──
  content.insertAdjacentHTML('beforeend','<div class="section-title">Progression par chapitre</div>');
  const chGrid=document.createElement('div');chGrid.className='chapters-grid';
  CHAPTERS.forEach(ch=>{
    const exos=[];for(let n=ch.first;n<=ch.last;n++)exos.push(n);
    const chTotal=exos.length,chDone=exos.filter(n=>doneSet.has(n)).length;
    const chPct=chTotal>0?(chDone/chTotal*100).toFixed(0):0;
    const chPts=exos.filter(n=>doneSet.has(n)).reduce((s,n)=>s+PTS[LEVELS[n]||3],0);
    const complete=chDone===chTotal;
    const card=document.createElement('div');card.className='ch-card';
    card.innerHTML=`
      <div class="ch-header"><span class="ch-num">Chapitre ${ch.num}</span><span class="ch-pct" style="color:${complete?'var(--gold)':'var(--ink2)'}">${chPct} %${complete?' ✓':''}</span></div>
      <div class="ch-name">${ch.name}</div>
      <div class="ch-bar"><div class="ch-fill${complete?' complete':''}" style="width:${chPct}%"></div></div>
      <div class="ch-stats"><div class="ch-stat"><span>${chDone}</span> / ${chTotal} exos</div><div class="ch-stat"><span>${chPts}</span> pts</div></div>`;
    chGrid.appendChild(card);
  });
  content.appendChild(chGrid);

  // ── HEATMAP ──
  content.insertAdjacentHTML('beforeend','<div class="section-title">Activité (90 derniers jours)</div>');
  const hmCard=document.createElement('div');hmCard.className='heatmap-card';
  hmCard.appendChild(buildHeatmap(activeDays));
  hmCard.insertAdjacentHTML('beforeend',`<div class="hm-legend"><div class="hm-day"></div> Inactif &nbsp;<div class="hm-day active"></div> Actif &nbsp;<div class="hm-day today"></div> Aujourd'hui</div>`);
  content.appendChild(hmCard);

  // ── CHART ──
  const chartWrap=buildChart(logs||[]);
  document.getElementById('progressCanvas').dataset.uid=targetId;
  content.appendChild(chartWrap);
}
init();
</script>
</body>
</html>
