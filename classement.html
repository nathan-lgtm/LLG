<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polycopié LLG — Connexion</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap');

    :root {
      --bg:      #f5f3ee;
      --surface: #fdfcf9;
      --ink:     #1c1a17;
      --ink2:    #5a5650;
      --ink3:    #9a9590;
      --gold:    #7c5c2a;
      --gold-l:  #e8dcc8;
      --gold-ll: #f5f0e8;
      --green:   #2a5c3a;
      --border:  #ddd9d0;
      --border-s:#c8c3b8;
      --err:     #a03020;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Crimson Pro', Georgia, serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border-s);
      border-radius: 8px;
      width: 100%;
      max-width: 400px;
      padding: 2.5rem 2.5rem 2rem;
    }

    .logo { text-align: center; margin-bottom: 2rem; }
    .logo h1 { font-size: 1.8rem; font-weight: 300; letter-spacing: -0.02em; }
    .logo h1 em { font-style: italic; color: var(--gold); }
    .logo p { font-size: 0.82rem; color: var(--ink3); font-style: italic; margin-top: 4px; }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.8rem;
    }
    .tab {
      flex: 1; text-align: center; padding: 8px 0;
      font-size: 0.9rem; color: var(--ink3);
      cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -1px; transition: all 0.15s;
    }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

    .form-group { margin-bottom: 1.2rem; }
    label { display: block; font-size: 0.8rem; color: var(--ink2); margin-bottom: 5px; }
    input[type=text], input[type=email], input[type=password] {
      width: 100%; padding: 9px 12px;
      border: 1px solid var(--border-s); border-radius: 4px;
      background: var(--bg); font-family: 'Crimson Pro', serif; font-size: 1rem;
      color: var(--ink); outline: none; transition: border-color 0.15s;
    }
    input:focus { border-color: var(--gold); }

    .btn {
      width: 100%; padding: 10px;
      background: var(--ink); color: var(--surface);
      border: none; border-radius: 4px;
      font-family: 'Crimson Pro', serif; font-size: 1rem;
      cursor: pointer; transition: opacity 0.15s;
      margin-top: 0.5rem;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .msg {
      margin-top: 1rem; padding: 10px 12px;
      border-radius: 4px; font-size: 0.85rem; display: none;
    }
    .msg.err { background: #fde8e4; color: var(--err); border: 1px solid #f0c0b0; }
    .msg.ok  { background: #e8f4e8; color: var(--green); border: 1px solid #b0d8b0; }

    .panel { display: none; }
    .panel.active { display: block; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <h1>Polycopié <em>LLG</em></h1>
    <p>Mathématiques du lycée aux CPGE scientifiques</p>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="login">Connexion</div>
    <div class="tab" data-tab="signup">Inscription</div>
  </div>

  <!-- LOGIN -->
  <div class="panel active" id="panel-login">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="ton@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="login-pwd" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn" id="btn-login">Se connecter</button>
    <div class="msg" id="msg-login"></div>
  </div>

  <!-- SIGNUP -->
  <div class="panel" id="panel-signup">
    <div class="form-group">
      <label>Prénom / pseudo</label>
      <input type="text" id="signup-name" placeholder="Ex : Marie" maxlength="30">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="signup-email" placeholder="ton@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="signup-pwd" placeholder="8 caractères minimum" autocomplete="new-password">
    </div>
    <button class="btn" id="btn-signup">Créer mon compte</button>
    <div class="msg" id="msg-signup"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════
// ⚙️  REMPLACE CES DEUX VALEURS
// ════════════════════════════════════════════
const SUPABASE_URL  = 'https://XXXXXXXXXXXX.supabase.co';
const SUPABASE_ANON = 'eyXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX';
// ════════════════════════════════════════════

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// Redirect if already logged in
sb.auth.getSession().then(({ data }) => {
  if (data.session) location.href = 'app.html';
});

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab, .panel').forEach(el => el.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
  });
});

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

// LOGIN
document.getElementById('btn-login').addEventListener('click', async () => {
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Connexion…';
  const { error } = await sb.auth.signInWithPassword({
    email: document.getElementById('login-email').value.trim(),
    password: document.getElementById('login-pwd').value,
  });
  if (error) {
    showMsg('msg-login', 'Email ou mot de passe incorrect.', 'err');
    btn.disabled = false; btn.textContent = 'Se connecter';
  } else {
    location.href = 'app.html';
  }
});

// SIGNUP
document.getElementById('btn-signup').addEventListener('click', async () => {
  const btn = document.getElementById('btn-signup');
  const name  = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const pwd   = document.getElementById('signup-pwd').value;

  if (!name) return showMsg('msg-signup', 'Entre un prénom ou pseudo.', 'err');
  if (pwd.length < 8) return showMsg('msg-signup', 'Le mot de passe doit faire 8 caractères minimum.', 'err');

  btn.disabled = true; btn.textContent = 'Création…';

  const { data, error } = await sb.auth.signUp({ email, password: pwd });
  if (error) {
    showMsg('msg-signup', error.message, 'err');
    btn.disabled = false; btn.textContent = 'Créer mon compte';
    return;
  }

  // Update username in profiles table
  if (data.user) {
    await sb.from('profiles').update({ username: name }).eq('id', data.user.id);
  }

  showMsg('msg-signup', 'Compte créé ! Tu peux te connecter.', 'ok');
  btn.disabled = false; btn.textContent = 'Créer mon compte';
});

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const active = document.querySelector('.panel.active');
    active.querySelector('.btn').click();
  }
});
</script>
</body>
</html>
